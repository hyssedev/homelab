global
    daemon
    user haproxy
    group haproxy
    chroot /var/lib/haproxy

    # Syslog logging
    log /dev/log local0
    log /dev/log local1 notice

    # Stats
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

    maxconn 100000

    # TLS settings
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256

defaults
    mode    http
    log     global

    option http-keep-alive
    option abortonclose
    option dontlognull
    option httpchk
    
    # Timeouts
    timeout client          30s
    timeout server          30s
    timeout connect         5s
    timeout queue           5s
    timeout http-request    5s
    timeout http-keep-alive 2s
    timeout tunnel          1h

    retries 3

    default-server inter 3s fall 3 rise 2

frontend http_in
    bind *:80

    # http -> https redirect
    http-request redirect scheme https code 301 unless { ssl_fc }

frontend https_in
    bind *:443 ssl crt /etc/haproxy/certs/ strict-sni alpn h2,http/1.1

    unique-id-format %[uuid(7)]
    http-request set-header X-Request-Id %[unique-id]
    http-request set-header X-Forwarded-Proto https
    http-request del-header X-Forwarded-For
    http-request set-header X-Forwarded-For %[src]

    # Generic security headers available for all backends
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header Referrer-Policy strict-origin-when-cross-origin
    http-response set-header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"

listen stats
    bind 127.0.0.1:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats hide-version

    stats admin if LOCALHOST
