global
    daemon
    user haproxy
    group haproxy
    chroot /var/lib/haproxy

    # Syslog logging
    log /dev/log local0
    log /dev/log local1 notice

    # Stats
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

defaults
    mode http
    log global
    
    option dontlognull

    balance roundrobin

frontend website
    bind :80
    default_backend web_servers

backend web_servers
    server s1 192.168.1.25:80
    server s2 192.168.1.26:80

listen stats
    bind 127.0.0.1:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats hide-version

    stats admin if LOCALHOST
