global
    daemon
    user haproxy
    group haproxy
    chroot /var/lib/haproxy

    # Syslog logging
    log /dev/log local0
    log /dev/log local1 notice

    # Stats
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

    maxconn 100000

    # TLS settings
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256

    # Auth request LUAs for tinyauth
    tune.lua.bool-sample-conversion normal
    lua-prepend-path /usr/share/haproxy/?/http.lua
    lua-load /usr/share/haproxy/auth-request.lua

defaults
    mode    http
    log     global

    log-format '{"timestamp":"%tr","client_ip":"%ci","client_port":%cp,"frontend":"%f","backend":"%b","server":"%s","tr":%TR,"tw":%Tw,"tc":%Tc,"tr_dur":%Tr,"ta":%Ta,"status":%ST,"bytes_read":%B,"req_method":"%HM","req_uri":"%HU","req_proto":"%HV","req_id":"%ID","ssl":%[ssl_fc],"sni":"%[ssl_fc_sni]","host":"%[capture.req.hdr(0)]","user_agent":"%[capture.req.hdr(1)]","x_forwarded_for":"%[capture.req.hdr(2)]"}'

    option http-keep-alive
    option abortonclose
    option dontlognull
    option httpchk
    
    # Timeouts
    timeout client          30s
    timeout server          30s
    timeout connect         5s
    timeout queue           5s
    timeout http-request    5s
    timeout http-keep-alive 2s
    timeout tunnel          1h

    retries 3

    default-server inter 3s fall 3 rise 2

frontend http_in
    bind *:80

    # http -> https redirect
    http-request redirect scheme https code 301 unless { ssl_fc }

frontend https_in
    bind *:443 ssl crt /etc/haproxy/certs/ strict-sni alpn h2,http/1.1

    unique-id-format %[uuid(7)]
    http-request set-header X-Request-Id %[unique-id]
    http-request set-header X-Forwarded-Proto https
    http-request del-header X-Forwarded-For
    http-request set-header X-Forwarded-For %[src]

    # Headers capturing for logging
	capture request header Host len 64
    capture request header User-Agent len 200
    capture request header X-Forwarded-For len 64

    # Generic security headers available for all backends
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header Referrer-Policy strict-origin-when-cross-origin
    http-response set-header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"

    # Rate limiter, 429 if more than 50reqs/10s
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 50 }

    # Drop unknown hosts
    acl known_host hdr(host) -i chrs.ro www.chrs.ro auth.internal.chrs.ro grafana.internal.chrs.ro
    http-request set-log-level silent   if !known_host
    http-request reject                 if !known_host

    # Authenthication
    acl protected hdr(host) -i grafana.internal.chrs.ro

    # Do not trust client-supplied identity headers, anti-spoofing
    http-request del-header Remote-User
    http-request del-header Remote-Name
    http-request del-header Remote-Email
    http-request del-header Remote-Groups
    http-request del-header Remote-Sub

    http-request set-header X-Forwarded-Host %[req.hdr(host)] if protected
    http-request set-header X-Forwarded-Uri  %[pathq]         if protected
    http-request lua.auth-request auth /api/auth/nginx        if protected
    http-request redirect location %[var(req.auth_response_header.x_tinyauth_location)] code 302 if protected !{ var(txn.auth_response_successful) -m bool }

    http-request set-header Remote-User  %[var(req.auth_response_header.remote_user)]  if protected { var(txn.auth_response_successful) -m bool }
    http-request set-header Remote-Email %[var(req.auth_response_header.remote_email)] if protected { var(txn.auth_response_successful) -m bool }

    # Routing
    use_backend chrs.ro if { hdr(host) -i chrs.ro www.chrs.ro }
    use_backend auth if { hdr(host) -i auth.internal.chrs.ro }
    use_backend grafana if { hdr(host) -i grafana.internal.chrs.ro }

backend chrs.ro
    option httpchk GET /health
    http-check expect status 200

    # Caching handled app-level by SWS
    
    # Strict security headers for static
    http-response set-header X-Frame-Options DENY
    http-response set-header Cross-Origin-Opener-Policy same-origin
    http-response set-header Cross-Origin-Resource-Policy same-origin
    http-response set-header Content-Security-Policy "default-src 'self'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' https://static.cloudflareinsights.com; connect-src 'self' https://cloudflareinsights.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';"
    
    server go1 127.0.0.1:8080 check

backend auth
    option httpchk GET /api/healthz
    http-check expect status 200
    
    server tinyauth 127.0.0.1:3000 check

backend grafana
    option httpchk GET /api/health
    http-check expect status 200

    server grafana 127.0.0.1:3001 check

listen stats
    bind 127.0.0.1:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats hide-version

    stats admin if LOCALHOST
