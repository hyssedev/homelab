global:
  scrape_interval: 10s

scrape_configs:
- job_name: victoriametrics
  static_configs:
  - targets:
    - victoriametrics:8428
- job_name: victorialogs
  static_configs:
  - targets:
    - victorialogs:9428
- job_name: nodeexporter
  static_configs:
  - targets:
    - nodeexporter:9100
- job_name: cadvisor
  static_configs:
  - targets:
    - cadvisor:8080
- job_name: haproxy
  static_configs:
  - targets:
    - 172.20.0.1:8405
- job_name: grafana
  static_configs:
  - targets:
    - grafana:3000