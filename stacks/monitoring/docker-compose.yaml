services:
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.internal.chrs.ro/
    ports:
      - 127.0.0.1:3001:3000
    volumes:
      - grafana_storage:/var/lib/grafana

volumes:
  grafana_storage: {}