data_dir: /var/lib/vector

sources:
  docker:
    type: docker_logs
    exclude_containers:
      - vector

  host_syslog:
    type: syslog
    address: 0.0.0.0:5140
    mode: udp

transforms:
  docker_tag:
    type: remap
    inputs: [docker]
    source: |-
      .log_source = "docker"

  # parse HAProxy json logs
  haproxy_parse:
    type: remap
    inputs: [host_syslog]
    source: |-
      ts = .timestamp
      raw = replace(string!(.message), r'^@cee:', "")
      parsed, err = parse_json(raw)
      if err == null {
        . = object!(parsed)
        .timestamp = ts          # keep syslog's RFC3339 time, not HAProxy's %tr
        if exists(._msg) {
          .message = ._msg
          del(._msg)
        } else {
          .message = raw
        }
      } else {
        .message = raw
      }
      .log_source = "haproxy"

  # drop grafana datasource-proxy calls
  haproxy_denoise:
    type: filter
    inputs: [haproxy_parse]
    condition: |-
      !(match(to_string(.req_uri) ?? "", r'/api/(ds/query|datasources/)') && .status == 200)

sinks:
  vlogs:
    type: elasticsearch
    inputs: [docker_tag, haproxy_denoise]
    endpoints:
      - http://victorialogs:9428/insert/elasticsearch/
    api_version: v8
    compression: gzip
    healthcheck:
      enabled: false
    query:
      _msg_field: message
      _time_field: timestamp
      _stream_fields: log_source,container_name
    buffer:
      type: disk
      max_size: 536870912   # 512 MB buffer on disk
      when_full: block
